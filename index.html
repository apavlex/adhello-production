    <!-- AdHello Leads Tracking Pixel -->
    <script>
      (function() {
        const TRACKING_URL = 'https://leads.adhello.ai/api/track';
        const payload = {
          path: window.location.pathname,
          referrer: document.referrer || 'direct',
          userAgent: navigator.userAgent
        };
        
        fetch(TRACKING_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).catch(err => console.log('Analytics sync failed:', err));
      })();
